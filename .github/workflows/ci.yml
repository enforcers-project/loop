name: CI

# Lint, type-check, format-check and build both workspaces on every PR and on
# pushes to main. A PR must be green here before it can merge (see the team's
# working agreements in planning/work_plan_and_schedule.md).
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Frontend is plain JS/JSX and has no typecheck script; skip where absent.
      - name: Type-check
        run: npm run typecheck --if-present

      - name: Format check
        run: npm run format:check

      # Frontend bundles with Vite; the plain-JS backend has no build step.
      - name: Build
        run: npm run build --if-present
